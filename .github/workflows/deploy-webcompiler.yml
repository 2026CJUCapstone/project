name: Deploy Webcompiler

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-webcompiler
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start SSH Agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.WEBCOMPILER_DEPLOY_SSH_KEY }}

      - name: Trust Deploy Host
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${{ secrets.WEBCOMPILER_DEPLOY_PORT }}" -H "${{ secrets.WEBCOMPILER_DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Update Remote Repository
        env:
          DEPLOY_BRANCH: ${{ github.ref_name }}
          DEPLOY_HOST: ${{ secrets.WEBCOMPILER_DEPLOY_HOST }}
          DEPLOY_PATH: ${{ secrets.WEBCOMPILER_DEPLOY_PATH }}
          DEPLOY_PORT: ${{ secrets.WEBCOMPILER_DEPLOY_PORT }}
          DEPLOY_REPO: ${{ github.server_url }}/${{ github.repository }}.git
          DEPLOY_USER: ${{ secrets.WEBCOMPILER_DEPLOY_USER }}
        run: |
          ssh -p "${DEPLOY_PORT}" "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "DEPLOY_BRANCH='${DEPLOY_BRANCH}' DEPLOY_PATH='${DEPLOY_PATH}' DEPLOY_REPO='${DEPLOY_REPO}' RUN_DEPLOY_SCRIPT=0 bash -s" \
            < scripts/sync_remote_repo.sh

      - name: Run Remote Deploy
        env:
          DEPLOY_HOST: ${{ secrets.WEBCOMPILER_DEPLOY_HOST }}
          DEPLOY_PATH: ${{ secrets.WEBCOMPILER_DEPLOY_PATH }}
          DEPLOY_PORT: ${{ secrets.WEBCOMPILER_DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.WEBCOMPILER_DEPLOY_USER }}
        run: |
          ssh -p "${DEPLOY_PORT}" "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "cd '${DEPLOY_PATH}' && bash scripts/deploy_server.sh"
