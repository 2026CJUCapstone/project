name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Backend Dependencies
        run: python -m pip install --upgrade pip && pip install -r backend/requirements.txt

      - name: Run Backend Tests
        run: pytest -q backend/tests

  frontend-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Frontend
        working-directory: frontend
        run: npm run build

  e2e-stack:
    runs-on: ubuntu-latest
    needs:
      - backend-tests
      - frontend-build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify Docker
        run: docker version

      - name: Run Docker E2E
        run: python3 scripts/e2e_stack_test.py

      - name: Dump Container Logs On Failure
        if: failure()
        run: docker compose logs --no-color || true

      - name: Clean Up Docker Stack
        if: always()
        run: bash scripts/docker_down.sh || true
